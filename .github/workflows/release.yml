name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, e.g. v1.0.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            goos: linux
            goarch: amd64
            ext: ""
            archive: tar.gz
          - name: darwin-arm64
            goos: darwin
            goarch: arm64
            ext: ""
            archive: tar.gz
          - name: windows-amd64
            goos: windows
            goarch: amd64
            ext: ".exe"
            archive: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "commit=$(git rev-parse --short HEAD)" >> "${GITHUB_OUTPUT}"
          echo "build_date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "${GITHUB_OUTPUT}"

      - name: Build
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ steps.meta.outputs.tag }}
          COMMIT: ${{ steps.meta.outputs.commit }}
          BUILD_DATE: ${{ steps.meta.outputs.build_date }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "dist/asm-${VERSION}-${{ matrix.name }}"
          ldflags="-s -w \
            -X 'github.com/asm-cli/asm-cli/internal/version.Version=${VERSION}' \
            -X 'github.com/asm-cli/asm-cli/internal/version.Commit=${COMMIT}' \
            -X 'github.com/asm-cli/asm-cli/internal/version.BuildDate=${BUILD_DATE}'"
          go build -trimpath -ldflags "${ldflags}" \
            -o "dist/asm-${VERSION}-${{ matrix.name }}/asm${{ matrix.ext }}" .
          cp README.md README.zh.md "dist/asm-${VERSION}-${{ matrix.name }}/"

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          base="asm-${{ steps.meta.outputs.tag }}-${{ matrix.name }}"
          if [[ "${{ matrix.archive }}" == "zip" ]]; then
            zip -r "${base}.zip" "${base}"
            sha256sum "${base}.zip" > "${base}.zip.sha256"
            cp "${base}.zip" "asm-latest-${{ matrix.name }}.zip"
            cp "${base}.zip.sha256" "asm-latest-${{ matrix.name }}.zip.sha256"
          else
            tar -czf "${base}.tar.gz" "${base}"
            sha256sum "${base}.tar.gz" > "${base}.tar.gz.sha256"
            cp "${base}.tar.gz" "asm-latest-${{ matrix.name }}.tar.gz"
            cp "${base}.tar.gz.sha256" "asm-latest-${{ matrix.name }}.tar.gz.sha256"
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: asm-${{ steps.meta.outputs.tag }}-${{ matrix.name }}
          if-no-files-found: error
          path: |
            dist/asm-${{ steps.meta.outputs.tag }}-${{ matrix.name }}.${{ matrix.archive }}
            dist/asm-${{ steps.meta.outputs.tag }}-${{ matrix.name }}.${{ matrix.archive }}.sha256
            dist/asm-latest-${{ matrix.name }}.${{ matrix.archive }}
            dist/asm-latest-${{ matrix.name }}.${{ matrix.archive }}.sha256

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Resolve release tag
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          generate_release_notes: true
          files: release-assets/*
